<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DvD Flower</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Baloo 2 - Hỗ trợ tốt tiếng Việt, nét tròn trịa giống ảnh mẫu -->
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Ép buộc font Baloo 2 cho toàn bộ văn bản */
        * {
            font-family: 'Baloo 2', cursive !important;
        }
        
        body { 
            min-height: 100vh; 
            background: radial-gradient(circle at top left, rgba(255,182,216,.45), transparent 28%), radial-gradient(circle at top right, rgba(255,255,180,.28), transparent 24%), radial-gradient(circle at bottom right, rgba(170,255,210,.35), transparent 30%), linear-gradient( to bottom, #fff6fb 0%, #f6fff8 40%, #eef8ff 100% ); 
            overflow-x: hidden; 
        }

        /* Tinh chỉnh typography để giống ảnh mẫu */
        h1, h2, h3, h4 {
            letter-spacing: 1px !important;
            font-weight: 700 !important;
        }

        .header-box { background: linear-gradient(135deg, #0c4c3d, #196953); }
        .section { display: none; }
        .active-section { display: block; }
        
        /* Đảm bảo các ký tự có dấu hiển thị mượt mà */
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body>

<div class="max-w-7xl mx-auto p-5">
    <div class="header-box rounded-[40px] p-8 shadow-2xl">
        <h1 class="text-5xl font-bold text-white">DvD Flower</h1>
        <p class="text-green-100 mt-2 text-xl">Fantasy Flower Inventory RPG</p>
    </div>
    
    <!-- Nội dung chính -->
    <div id="content" class="mt-6">
        <p class="text-2xl text-gray-800">Cấu hình font Baloo 2 đã được áp dụng thành công.</p>
    </div>
</div>

<script>
    // Logic code của bạn giữ nguyên
</script>

</body>
</html>
