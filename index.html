<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DvD Flower - Full System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .section { display:none; } .active-section { display:block; }
        .card { transition:.25s; cursor: pointer; }
        .card:hover { transform: translateY(-6px) scale(1.03); }
        .modal { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; justify-content:center; align-items:center; z-index:999; }
    </style>
</head>
<body>

<div class="max-w-7xl mx-auto p-5">
    <div id="adminSection" class="section active-section">
        <h2 class="text-3xl font-black mb-4">🌷 Admin Panel - Quản Lý Kho Hoa</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-100 p-6 rounded-2xl">
            <input id="memberName" placeholder="Tên ingame" class="p-3 border rounded-xl"/>
            <input id="flowerName" placeholder="Tên hoa" class="p-3 border rounded-xl"/>
            <select id="flowerRarity" class="p-3 border rounded-xl"><option>HOA ĐỎ</option><option>HOA CAM</option></select>
            <input id="flowerImage" type="file" class="p-3"/>
            <button onclick="addFlower()" class="bg-green-600 text-white p-3 rounded-xl font-bold">➕ Thêm Hoa</button>
        </div>
        <div id="adminFlowerList" class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6"></div>
    </div>
</div>

<script>
    let flowers = [];
    
    // HÀM THÊM HOA (Firebase)
    async function addFlower() {
        const name = document.getElementById('flowerName').value;
        const imgInput = document.getElementById('flowerImage');
        if(!imgInput.files[0]) return alert("Chọn ảnh!");
        
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = { 
                name: name, 
                rarity: document.getElementById('flowerRarity').value,
                image: e.target.result,
                owners: [{ ingame: document.getElementById('memberName').value }]
            };
            await window.addFlowerToCloud(data);
            alert("Đã thêm thành công!");
        };
        reader.readAsDataURL(imgInput.files[0]);
    }

    // HÀM XÓA HOA
    async function delFlow(id) {
        if(confirm("Xóa hoa này?")) await window.deleteFlowerFromCloud(id);
    }

    // HÀM RENDER ADMIN
    function renderAdminFlowers() {
        const list = document.getElementById('adminFlowerList');
        list.innerHTML = flowers.map(f => `
            <div class="bg-white p-4 rounded-2xl shadow">
                <img src="${f.image}" class="w-full h-32 object-cover rounded-xl">
                <p class="font-bold mt-2">${f.name}</p>
                <button onclick="delFlow('${f.id}')" class="bg-red-500 text-white w-full py-2 mt-2 rounded-lg">Xóa</button>
            </div>
        `).join('');
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyArdShAGDqUhY0wWRlGLO_FZRuabG4BNOs",
        projectId: "dvdflowers",
        storageBucket: "dvdflowers.firebasestorage.app"
    }));

    const col = collection(db, "flowers");

    onSnapshot(col, (snap) => {
        flowers = [];
        snap.forEach(d => flowers.push({ id: d.id, ...d.data() }));
        renderAdminFlowers();
    });

    window.addFlowerToCloud = async (d) => await addDoc(col, d);
    window.deleteFlowerFromCloud = async (id) => await deleteDoc(doc(db, "flowers", id));
</script>
</body>
</html>
