<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DvD Flower</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,600;0,900;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{ min-height:100vh; font-family: 'Nunito', sans-serif; background: radial-gradient(circle at top left, rgba(255,182,216,.45), transparent 28%), radial-gradient(circle at top right, rgba(255,255,180,.28), transparent 24%), radial-gradient(circle at bottom right, rgba(170,255,210,.35), transparent 30%), linear-gradient( to bottom, #fff6fb 0%, #f6fff8 40%, #eef8ff 100% ); overflow-x:hidden; }
body::before{ content:'🌸 🌷 🌺 🍀 🌸 🌷'; position:fixed; top:20px; left:-200px; font-size:38px; opacity:.12; animation: sakuraMove 24s linear infinite; white-space:nowrap; z-index:-1; }
body::after{ content:'🌷 🌸 🍃 🌺 🌷'; position:fixed; bottom:40px; right:-220px; font-size:34px; opacity:.1; animation: sakuraMove2 28s linear infinite; white-space:nowrap; z-index:-1; }
@keyframes sakuraMove{ 0%{ transform:translateX(0); } 100%{ transform:translateX(130vw); } }
@keyframes sakuraMove2{ 0%{ transform:translateX(0); } 100%{ transform:translateX(-130vw); } }
.section{ display:none; }
.active-section{ display:block; }
.header-box{ background: linear-gradient( 135deg, #0c4c3d, #196953 ); position:relative; overflow:hidden; }
.header-box::after{ content:'🌸'; position:absolute; right:20px; top:10px; font-size:130px; opacity:.08; }
.menu-btn{ transition:.25s; position:relative; overflow:hidden; }
.menu-btn:hover{ transform: translateY(-4px) scale(1.02); }
.menu-btn::before{ content:''; position:absolute; inset:0; background: linear-gradient( to right, transparent, rgba(255,255,255,.25), transparent ); transform:translateX(-100%); }
.menu-btn:hover::before{ transform:translateX(100%); transition:.7s; }
.card{ transition:.25s; position:relative; overflow:hidden; cursor: pointer; }
.card:hover{ transform: translateY(-6px) scale(1.03); box-shadow: 0 20px 40px rgba(0,0,0,.12); }
.card::before{ content:''; position:absolute; top:-40%; left:-40%; width:180%; height:180%; background: linear-gradient( 120deg, transparent, rgba(255,255,255,.35), transparent ); transform:rotate(25deg); transition:.7s; }
.card:hover::before{ left:120%; }
.rarity-red{ background: linear-gradient(to bottom,#ffe3e3,#fff7f7); }
.rarity-orange{ background: gradient(to bottom,#ffe7cf,#fff8ef); }
.rarity-orange{ background: linear-gradient(to bottom,#ffe7cf,#fff8ef); }
.rarity-purple{ background: linear-gradient(to bottom,#f1e2ff,#fff8ff); }
.rarity-blue{ background: linear-gradient(to bottom,#dff1ff,#f7fcff); }
.rarity-green{ background: linear-gradient(to bottom,#ddffe6,#f6fff8); }
.flower-img{ filter: drop-shadow(0 10px 15px rgba(0,0,0,.18)); transition:.25s; }
.card:hover .flower-img{ transform:scale(1.08); }
@keyframes floaty{ 0%{ transform:translateY(0px); } 50%{ transform:translateY(-8px); } 100%{ transform:translateY(0px); } }
.floaty{ animation: floaty 3s ease-in-out infinite; }
.modal{ position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; justify-content:center; align-items:center; z-index:999; }
.modal-content{ background: linear-gradient( to bottom, white, #fff8fb ); box-shadow: 0 25px 50px rgba(0,0,0,.2); }
.owner-box{ background: linear-gradient( to right, white, #fff7fb ); border: 1px solid #ffd9eb; }
::-webkit-scrollbar{ width:10px; }
::-webkit-scrollbar-thumb{ background:#ffb7d5; border-radius:20px; }
</style>
</head>
<body>
<div class="max-w-7xl mx-auto p-5">

<div class="header-box rounded-[40px] p-8 shadow-2xl">
<div class="flex items-center gap-6">
<div class="w-28 h-28 rounded-full bg-yellow-300 flex items-center justify-center text-5xl shadow-xl floaty">🌸</div>
<div>
<h1 class="text-5xl md:text-7xl font-black text-white">DvD Flower</h1>
<p class="text-green-100 mt-3 text-xl font-bold">Fantasy Flower Inventory RPG</p>
</div>
</div>
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8">
<button onclick="showSection('homeSection')" class="menu-btn bg-yellow-400 text-black rounded-3xl py-5 text-2xl font-black shadow-lg">🔎 Tra cứu</button>
<button onclick="showSection('memberSection')" class="menu-btn bg-[#1c5d4d] text-white rounded-3xl py-5 text-2xl font-black shadow-lg">👥 Thành viên</button>
<button onclick="showSection('flowerSection')" class="menu-btn bg-[#1c5d4d] text-white rounded-3xl py-5 text-2xl font-black shadow-lg">🌸 Danh sách hoa</button>
<button onclick="adminLogin()" class="menu-btn bg-[#1c5d4d] text-white rounded-3xl py-5 text-2xl font-black shadow-lg">🔐 Admin</button>
</div>
</div>

<div id="homeSection" class="section active-section bg-white/80 backdrop-blur rounded-[35px] p-6 shadow-xl mt-6">
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<input id="searchInput" oninput="searchFlowers()" placeholder="🔎 Tìm tên hoa hoặc ingame..." class="border rounded-2xl p-4 text-lg outline-none font-bold"/>
<select id="rarityFilter" onchange="searchFlowers()" class="border rounded-2xl p-4 text-lg font-bold">
<option value="">Tất cả phẩm</option>
<option>HOA ĐỎ</option>
<option>HOA CAM</option>
<option>HOA TÍM</option>
<option>HOA LAM</option>
<option>HOA LỤC</option>
</select>
<div class="bg-[#f7f7f7] rounded-2xl p-4 font-black text-xl">🌸 Tổng hoa: <span id="totalFlowers">0</span></div>
</div>
<div id="searchGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-5 mt-6"></div>
</div>

<div id="memberSection" class="section bg-white/80 backdrop-blur rounded-[35px] p-6 shadow-xl mt-6">
<h2 class="text-4xl font-black mb-6">👥 Danh sách thành viên</h2>
<div id="memberList" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
</div>

<div id="flowerSection" class="section bg-white/80 backdrop-blur rounded-[35px] p-6 shadow-xl mt-6">
<h2 class="text-4xl font-black mb-6">🌸 Danh sách hoa</h2>
<div class="grid grid-cols-2 md:grid-cols-5 gap-4">
<button onclick="showRarity('HOA ĐỎ')" class="bg-red-100 text-red-700 rounded-2xl p-5 font-black text-xl">🌹 HOA ĐỎ</button>
<button onclick="showRarity('HOA CAM')" class="bg-orange-100 text-orange-700 rounded-2xl p-5 font-black text-xl">🧡 HOA CAM</button>
<button onclick="showRarity('HOA TÍM')" class="bg-purple-100 text-purple-700 rounded-2xl p-5 font-black text-xl">💜 HOA TÍM</button>
<button onclick="showRarity('HOA LAM')" class="bg-blue-100 text-blue-700 rounded-2xl p-5 font-black text-xl">💎 HOA LAM</button>
<button onclick="showRarity('HOA LỤC')" class="bg-green-100 text-green-700 rounded-2xl p-5 font-black text-xl">🍀 HOA LỤC</button>
</div>
<div id="rarityGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-5 mt-6"></div>
</div>

<div id="adminSection" class="section bg-white/80 backdrop-blur rounded-[35px] p-6 shadow-xl mt-6">
<h2 class="text-4xl font-black mb-6">🌷 Admin Panel</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<input id="memberName" placeholder="🎮 Tên ingame" class="border rounded-2xl p-4 font-bold"/>
<input id="memberZalo" placeholder="💬 Tên zalo" class="border rounded-2xl p-4 font-bold"/>
<input id="flowerName" placeholder="🌸 Tên hoa" class="border rounded-2xl p-4 font-bold"/>
<select id="flowerType" class="border rounded-2xl p-4 font-bold"><option value="xu">🌸 Hoa xu</option><option value="goi">🪙 Hoa gói</option></select>
<select id="flowerRarity" class="border rounded-2xl p-4 font-bold"><option>HOA ĐỎ</option><option>HOA CAM</option><option>HOA TÍM</option><option>HOA LAM</option><option>HOA LỤC</option></select>
<input id="flowerImage" type="file" accept="image/*" class="border rounded-2xl p-4 font-bold"/>
</div>
<div class="flex gap-4 mt-5 flex-wrap">
<button onclick="addFlower()" class="bg-yellow-400 text-black px-8 py-4 rounded-2xl font-black text-xl shadow-lg">➕ Thêm hoa / Thêm thành viên</button>
<button onclick="clearAllFlowers()" class="bg-red-500 text-white px-8 py-4 rounded-2xl font-black text-xl shadow-lg">🗑️ Xóa toàn bộ dữ liệu</button>
</div>
<hr class="my-8">
<h3 class="text-3xl font-black mb-5">📦 Dữ liệu kho hoa (Quản lý thành viên)</h3>
<div id="adminFlowerList" class="grid grid-cols-1 gap-6"></div>
</div>

<div id="memberFlowerModal" class="modal">
<div class="modal-content rounded-[35px] p-6 max-w-4xl w-full max-h-[90vh] overflow-y-auto m-4">
<div class="flex justify-between items-center mb-5">
  <h2 id="modalTitle" class="text-3xl font-black text-gray-800">🌸 Tiêu đề</h2>
  <button onclick="closeMemberModal()" class="bg-red-500 text-white px-5 py-2 rounded-2xl font-black shadow-md hover:bg-red-600 transition">Đóng</button>
</div>
<div id="memberFlowerContent" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
</div>
</div>

</div>
<script>
let flowers = [];
const adminPass = "DVD123";

async function saveData(){
  localStorage.setItem('dvdFlowers', JSON.stringify(flowers));
  if(window.saveCloudData){
    try {
      await window.saveCloudData();
    } catch(e) {
      alert("Lỗi lưu trữ dữ liệu đám mây!");
    }
  }
}

function showSection(id){ document.querySelectorAll('.section').forEach(s=>s.classList.remove('active-section')); document.getElementById(id).classList.add('active-section'); }
function adminLogin(){ const pass = prompt("Nhập mật khẩu Admin"); if(pass === adminPass){ showSection('adminSection'); alert("Đăng nhập thành công 🌸"); }else{ alert("Sai mật khẩu"); } }
function rarityClass(r){ switch(r){ case 'HOA ĐỎ': return 'rarity-red'; case 'HOA CAM': return 'rarity-orange'; case 'HOA TÍM': return 'rarity-purple'; case 'HOA LAM': return 'rarity-blue'; case 'HOA LỤC': return 'rarity-green'; default: return ''; } }

function mergedFlowers(){
  const map = {};
  flowers.forEach(f=>{
    if(!f || !f.name) return;
    const nameUpper = f.name.trim().toUpperCase();
    if(!map[nameUpper]){
      map[nameUpper]={ name:f.name, image:f.image, rarity:f.rarity, flowerXu: f.flowerXu, flowerPack: f.flowerPack, owners:[] };
    }
    if(f.owners && Array.isArray(f.owners)){
      f.owners.forEach(o => {
        if(!map[nameUpper].owners.some(existing => existing.ingame.trim().toLowerCase() === o.ingame.trim().toLowerCase())){
          map[nameUpper].owners.push({ ingame: o.ingame, zalo: o.zalo || '' });
        }
      });
    }
  });
  return Object.values(map);
}

function renderSearch(data=mergedFlowers()){
  const grid = document.getElementById('searchGrid'); if(!grid) return;
  grid.innerHTML = data.map(f=>`
  <div onclick="showFlowerOwners('${f.name.replace(/'/g, "\\'")}')" class="${rarityClass(f.rarity)} card rounded-[30px] p-4 shadow-lg">
    <div class="flex justify-center"><img src="${f.image}" class="flower-img w-32 h-32 object-contain"/></div>
    <h2 class="text-center text-xl font-black text-[#5f412e] mt-4 tracking-wide uppercase">${f.name}</h2>
    <div class="mt-3 space-y-2 text-center">
      ${f.flowerXu ? `<div class="bg-white px-4 py-2 rounded-full font-black shadow text-sm text-amber-600">🪙 Hoa xu</div>` : ''}
      ${f.flowerPack ? `<div class="bg-white px-4 py-2 rounded-full font-black shadow text-sm text-purple-600">🎁 Hoa gói</div>` : ''}
    </div>
    <div class="text-center text-xs text-pink-600 font-black mt-2">Xem người sở hữu 🔎</div>
  </div>`).join('');
  const tf = document.getElementById('totalFlowers'); if(tf) tf.innerText = data.length;
}

function searchFlowers(){
  const key = document.getElementById('searchInput').value.toLowerCase().trim();
  const rarity = document.getElementById('rarityFilter').value;
  let data = mergedFlowers();
  if(key){ data = data.filter(f=> f.name.toLowerCase().includes(key) || f.owners.some(o=> o.ingame.toLowerCase().includes(key)) ); }
  if(rarity){ data = data.filter(f=> f.rarity===rarity); }
  renderSearch(data);
}

function showRarity(r){
  const data = mergedFlowers().filter(f=>f.rarity===r);
  const grid = document.getElementById('rarityGrid'); if(!grid) return;
  grid.innerHTML = data.map(f=>`
  <div onclick="showFlowerOwners('${f.name.replace(/'/g, "\\'")}')" class="${rarityClass(f.rarity)} card rounded-[30px] p-4 shadow-lg">
    <div class="flex justify-center"><img src="${f.image}" class="flower-img w-28 h-28 object-contain"/></div>
    <h2 class="text-center text-lg font-black mt-4 uppercase tracking-wide text-gray-800">${f.name}</h2>
    <div class="text-center mt-3 space-y-2 text-sm font-black">
      <div>${f.flowerXu ? '🪙 Hoa xu' : ''}</div>
      <div>${f.flowerPack ? '🎁 Hoa gói' : ''}</div>
    </div>
    <div class="text-center text-xs text-pink-600 font-black mt-2">Xem người sở hữu 🔎</div>
  </div>`).join('');
}

// TÍNH NĂNG MỚI: BẤM VÀO HOA HIỆN DANH SÁCH THÀNH VIÊN SỞ HỮU
function showFlowerOwners(flowerName){
  const target = mergedFlowers().find(f => f.name.trim().toLowerCase() === flowerName.trim().toLowerCase());
  document.getElementById('modalTitle').innerText = `👥 Thành viên sở hữu: ${flowerName.toUpperCase()}`;
  
  const contentGrid = document.getElementById('memberFlowerContent');
  // Chuyển Modal layout sang dạng danh sách thành viên cho dễ nhìn
  contentGrid.className = "grid grid-cols-1 md:grid-cols-2 gap-4"; 
  
  if(target && target.owners && target.owners.length > 0){
    contentGrid.innerHTML = target.owners.map(o => `
      <div class="bg-gradient-to-r from-teal-50 to-white border border-teal-100 rounded-2xl p-4 shadow-sm">
        <div class="text-xl font-black text-teal-900">🎮 ${o.ingame}</div>
        <div class="text-sm font-bold text-gray-500 mt-1">💬 Zalo: ${o.zalo || 'Không có'}</div>
      </div>
    `).join('');
  } else {
    contentGrid.innerHTML = '<p class="text-center text-gray-500 font-bold py-4 col-span-2">Chưa có ai sở hữu bông hoa này.</p>';
  }
  document.getElementById('memberFlowerModal').style.display = 'flex';
}

// BẤM THÀNH VIÊN HIỆN DANH SÁCH HOA SỞ HỮU
function showMemberFlowers(memberName){
  document.getElementById('modalTitle').innerText = `🌸 Hoa sở hữu của: ${memberName}`;
  const contentGrid = document.getElementById('memberFlowerContent');
  // Đổi lại Grid 4 cột để hiển thị các thẻ hoa đẹp mắt
  contentGrid.className = "grid grid-cols-2 md:grid-cols-4 gap-4"; 
  
  const data = mergedFlowers().filter(f=> f.owners.some(o=>o.ingame.trim().toLowerCase() === memberName.trim().toLowerCase()) );
  const htmlData = data.map(f=>`
    <div class="${rarityClass(f.rarity)} rounded-3xl p-4 shadow-lg border border-gray-100">
      <div class="flex justify-center"><img src="${f.image}" class="w-24 h-24 object-contain"/></div>
      <h3 class="text-center font-black text-base mt-3 uppercase tracking-wide text-gray-800">${f.name}</h3>
      <div class="text-center mt-2 font-black text-xs text-teal-700">${f.flowerXu ? '🪙 Hoa xu' : '🎁 Hoa gói'}</div>
    </div>`).join('');
  contentGrid.innerHTML = htmlData || '<p class="text-center col-span-2 text-gray-500 font-bold py-4">Chưa sở hữu hoa nào.</p>';
  document.getElementById('memberFlowerModal').style.display='flex';
}

function closeMemberModal(){ document.getElementById('memberFlowerModal').style.display='none'; }

function renderMembers(){
  const members = {};
  flowers.forEach(f=>{
    if(f.owners && Array.isArray(f.owners)){
      f.owners.forEach(o=>{ 
        if(!members[o.ingame.trim().toLowerCase() blanks] && !members[o.ingame.trim().toLowerCase()]){ 
          members[o.ingame.trim().toLowerCase()] = { ingame:o.ingame, zalo:o.zalo }; 
        } 
      });
    }
  });
  const list = document.getElementById('memberList'); if(!list) return;
  list.innerHTML = Object.values(members).map(m=>`
    <button onclick="showMemberFlowers('${m.ingame.replace(/'/g, "\\'")}')" class="owner-box rounded-3xl p-5 text-left shadow hover:scale-[1.02] transition">
      <div class="text-2xl font-black text-[#1c5d4d]">🎮 ${m.ingame}</div>
      <div class="mt-2 text-gray-600 font-bold">💬 ${m.zalo || 'Không có zalo'}</div>
      <div class="mt-3 text-pink-600 font-black">Bấm để xem hoa sở hữu 🌸</div>
    </button>`).join('');
}

function renderAdminFlowers(){
  const list = document.getElementById('adminFlowerList'); if(!list) return;
  list.innerHTML = flowers.map((f, index)=>`
    <div class="${rarityClass(f.rarity)} rounded-3xl p-6 shadow-lg border border-gray-200">
      <div class="flex items-center gap-5 justify-between border-b pb-4 mb-4 border-gray-300/40">
        <div class="flex items-center gap-4">
          <img src="${f.image}" class="w-20 h-20 object-contain bg-white/50 p-1 rounded-xl shadow-sm"/>
          <div>
            <div class="text-2xl font-black text-gray-800 uppercase tracking-wide">${f.name}</div>
            <div class="text-sm font-black text-gray-500 mt-1">${f.rarity} • ${f.flowerPack > 0 ? '🎁 Hoa gói' : '🪙 Hoa xu'}</div>
          </div>
        </div>
        <button onclick="deleteFlower(${index})" class="bg-red-50 text-red-600 border border-red-200 font-black px-4 py-2 rounded-xl text-xs hover:bg-red-100">🗑️ Xóa bông này</button>
      </div>
      <div>
        <div class="text-xs font-black uppercase text-gray-400 mb-2">Thành viên sở hữu bông này:</div>
        <div class="space-y-2">
          ${(f.owners && f.owners.length > 0) ? f.owners.map((owner, oIndex) => `
            <div class="flex items-center justify-between bg-white/80 p-3 rounded-xl shadow-sm border border-pink-100">
              <div>
                <span class="font-black text-teal-900">🎮 ${owner.ingame}</span>
                <span class="text-xs font-bold text-gray-500 ml-2">${owner.zalo ? `(💬 Zalo: ${owner.zalo})` : ''}</span>
              </div>
              <div class="flex gap-2">
                <button onclick="editMemberName(${index}, ${oIndex})" class="bg-yellow-400 text-black px-3 py-1 rounded-lg text-xs font-black shadow-sm">✏️ Sửa tên</button>
                <button onclick="deleteMemberFromFlower(${index}, ${oIndex})" class="bg-red-500 text-white px-3 py-1 rounded-lg text-xs font-black shadow-sm">❌ Xóa người này</button>
              </div>
            </div>
          `).join('') : '<p class="text-xs text-gray-400 italic font-bold">Chưa có ai sở hữu bông hoa này</p>'}
        </div>
      </div>
    </div>`).join('');
}

function editMemberName(flowerIndex, ownerIndex) {
  const currentOwner = flowers[flowerIndex].owners[ownerIndex];
  const newIngame = prompt("Nhập tên Ingame mới:", currentOwner.ingame);
  if (newIngame === null || newIngame.trim() === "") return;
  const newZalo = prompt("Nhập tên Zalo mới (để trống nếu không đổi):", currentOwner.zalo || "");
  
  currentOwner.ingame = newIngame.trim();
  currentOwner.zalo = newZalo ? newZalo.trim() : "";
  
  saveData().then(() => { renderSearch(); renderMembers(); renderAdminFlowers(); alert("Đã cập nhật tên thành viên thành công! 🌸"); });
}

function deleteMemberFromFlower(flowerIndex, ownerIndex) {
  const targetFlower = flowers[flowerIndex];
  const memberName = targetFlower.owners[ownerIndex].ingame;
  
  if (confirm(`Bạn muốn xóa thành viên "${memberName}" khỏi bông hoa "${targetFlower.name.toUpperCase()}"?`)) {
    targetFlower.owners.splice(ownerIndex, 1);
    if (targetFlower.owners.length === 0) { flowers.splice(flowerIndex, 1); }
    saveData().then(() => { renderSearch(); renderMembers(); renderAdminFlowers(); alert("Đã xóa thành viên thành công! 🌸"); });
  }
}

function deleteFlower(index){
  if(confirm('Xóa hoàn toàn hoa này và toàn bộ danh sách thành viên bên trong?')){
    flowers.splice(index,1);
    saveData().then(() => { renderSearch(); renderMembers(); renderAdminFlowers(); });
  }
}

function clearAllFlowers(){
  if(confirm('Bạn có chắc muốn xóa TOÀN BỘ dữ liệu?')){
    flowers = []; localStorage.removeItem('dvdFlowers');
    saveData().then(() => { renderSearch(); renderMembers(); renderAdminFlowers(); alert('Đã xóa toàn bộ dữ liệu 🌸'); });
  }
}

function compressImage(file, maxWidth, maxHeight, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function (e) {
      const img = new Image();
      img.src = e.target.result;
      img.onload = function () {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        if (width > height) {
          if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
        } else {
          if (height > maxHeight) { width = Math.round((width * maxHeight) / height); height = maxHeight; }
        }
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
    };
    reader.onerror = error => reject(error);
  });
}

async function addFlower(){
  const ingame = document.getElementById('memberName').value.trim();
  const zalo = document.getElementById('memberZalo').value.trim();
  const flowerName = document.getElementById('flowerName').value.trim();
  const flowerType = document.getElementById('flowerType').value;
  const rarity = document.getElementById('flowerRarity').value;
  const imageFile = document.getElementById('flowerImage').files[0];
  
  if(!ingame || !flowerName){
    alert("Vui lòng nhập đủ thông tin: Tên ingame và Tên hoa!");
    return;
  }
  
  const existingFlower = flowers.find(f => f.name.trim().toUpperCase() === flowerName.toUpperCase());
  
  if(existingFlower){
    if(!existingFlower.owners) existingFlower.owners = [];
    const isExist = existingFlower.owners.some(o => o.ingame.trim().toLowerCase() === ingame.toLowerCase());
    if(!isExist){
      existingFlower.owners.push({ ingame: ingame, zalo: zalo });
    }
    
    await saveData();
    document.getElementById('memberName').value = ""; 
    document.getElementById('memberZalo').value = "";
    renderSearch(); renderMembers(); renderAdminFlowers();
    alert(`Đã thêm thành viên "${ingame}" vào bông hoa "${flowerName.toUpperCase()}" thành công! 🌸`);
  } else {
    if(!imageFile){
      alert("Bông hoa này chưa tồn tại. Vui lòng chọn FILE ẢNH cho loại hoa mới này!");
      return;
    }
    
    try {
      const compressedBase64 = await compressImage(imageFile, 400, 400, 0.7);
      
      flowers.push({
        name: flowerName,
        rarity: rarity,
        image: compressedBase64,
        flowerXu: flowerType === 'xu' ? 1 : 0,
        flowerPack: flowerType === 'goi' ? 1 : 0,
        owners: [{ ingame: ingame, zalo: zalo }]
      });
      
      await saveData();
      document.getElementById('memberName').value = ""; 
      document.getElementById('memberZalo').value = "";
      document.getElementById('flowerName').value = ""; 
      document.getElementById('flowerImage').value = "";
      renderSearch(); renderMembers(); renderAdminFlowers();
      alert("Đã tạo mẫu hoa mới và thêm thành viên thành công! 🌸");
    } catch (err) {
      alert("Lỗi xử lý nén ảnh: " + err.message);
    }
  }
}
</script>
