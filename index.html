<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DvD Flower</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, h1, h2, h3, h4, h5, h6, p, button, input, select, span, div { font-family: 'Baloo 2', sans-serif !important; -webkit-font-smoothing: antialiased !important; -moz-osx-font-smoothing: grayscale !important; }
        body { min-height: 100vh; background: radial-gradient(circle at top left, rgba(255,182,216,.45), transparent 28%), radial-gradient(circle at top right, rgba(255,255,180,.28), transparent 24%), radial-gradient(circle at bottom right, rgba(170,255,210,.35), transparent 30%), linear-gradient(to bottom, #fff6fb 0%, #f6fff8 40%, #eef8ff 100%); overflow-x: hidden; }
        body::before{ content:'🌸 🌷 🌺 🍀 🌸 🌷'; position:fixed; top:20px; left:-200px; font-size:38px; opacity:.12; animation: sakuraMove 24s linear infinite; white-space:nowrap; z-index:-1; }
        body::after{ content:'🌷 🌸 🍃 🌺 🌷'; position:fixed; bottom:40px; right:-220px; font-size:34px; opacity:.1; animation: sakuraMove2 28s linear infinite; white-space:nowrap; z-index:-1; }
        @keyframes sakuraMove{ 0%{ transform:translateX(0); } 100%{ transform:translateX(130vw); } }
        @keyframes sakuraMove2{ 0%{ transform:translateX(0); } 100%{ transform:translateX(-130vw); } }
        .section{ display:none; } .active-section{ display:block; }
        .header-box{ background: linear-gradient( 135deg, #0c4c3d, #196953 ); position:relative; overflow:hidden; }
        .header-box::after{ content:'🌸'; position:absolute; right:20px; top:10px; font-size:130px; opacity:.08; }
        .menu-btn{ transition:.25s; position:relative; overflow:hidden; }
        .menu-btn:hover{ transform: translateY(-4px) scale(1.02); }
        .card{ transition:.25s; position:relative; overflow:hidden; cursor: pointer; }
        .card:hover{ transform: translateY(-6px) scale(1.03); box-shadow: 0 20px 40px rgba(0,0,0,.12); }
        .rarity-red{ background: linear-gradient(to bottom,#ffe3e3,#fff7f7); }
        .rarity-orange{ background: linear-gradient(to bottom,#ffe7cf,#fff8ef); }
        .rarity-purple{ background: linear-gradient(to bottom,#f1e2ff,#fff8ff); }
        .rarity-blue{ background: linear-gradient(to bottom,#dff1ff,#f7fcff); }
        .rarity-green{ background: linear-gradient(to bottom,#ddffe6,#f6fff8); }
        .flower-img{ filter: drop-shadow(0 10px 15px rgba(0,0,0,.18)); transition:.25s; }
        .card:hover .flower-img{ transform:scale(1.08); }
        .modal{ position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; justify-content:center; align-items:center; z-index:999; }
        .modal-content{ background: linear-gradient( to bottom, white, #fff8fb ); box-shadow: 0 25px 50px rgba(0,0,0,.2); }
        .owner-box{ background: linear-gradient( to right, white, #fff7fb ); border: 1px solid #ffd9eb; }
        h1, h2, h3, .font-black { font-weight: 800 !important; }
    </style>
</head>
<body>
<div class="max-w-7xl mx-auto p-5">
    <div class="header-box rounded-[40px] p-8 shadow-2xl">
        <div class="flex items-center gap-6">
            <div class="w-28 h-28 rounded-full bg-yellow-300 flex items-center justify-center text-5xl shadow-xl">🌸</div>
            <div>
                <h1 class="text-5xl md:text-7xl font-black text-white">DvD Flower</h1>
                <p class="text-green-100 mt-3 text-xl">Hội Yêu Hoa Cỏ  - Trích Máu Nuôi Hoa</p>
            </div>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8">
            <button onclick="showSection('homeSection')" class="menu-btn bg-yellow-400 text-black rounded-3xl py-5 text-2xl font-black shadow-lg">🔎 Tra cứu</button>
            <button onclick="showSection('memberSection')" class="menu-btn bg-[#1c5d4d] text-white rounded-3xl py-5 text-2xl font-black shadow-lg">👥 Thành viên</button>
            <button onclick="showSection('flowerSection')" class="menu-btn bg-[#1c5d4d] text-white rounded-3xl py-5 text-2xl font-black shadow-lg">🌸 Danh sách hoa</button>
            <button onclick="adminLogin()" class="menu-btn bg-[#1c5d4d] text-white rounded-3xl py-5 text-2xl font-black shadow-lg">🔐 Admin</button>
        </div>
    </div>
    <div id="homeSection" class="section active-section bg-white/80 backdrop-blur rounded-[35px] p-6 shadow-xl mt-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <input id="searchInput" oninput="searchFlowers()" placeholder="🔎 Tìm tên hoa hoặc ingame..." class="border rounded-2xl p-4 text-lg outline-none"/>
            <select id="rarityFilter" onchange="searchFlowers()" class="border rounded-2xl p-4 text-lg">
                <option value="">Tất cả phẩm</option>
                <option>HOA ĐỎ</option><option>HOA CAM</option><option>HOA TÍM</option><option>HOA LAM</option><option>HOA LỤC</option>
            </select>
            <div class="bg-[#f7f7f7] rounded-2xl p-4 font-black text-xl">🌸 Tổng loại hoa: <span id="totalFlowers" class="text-pink-600">0</span></div>
        </div>
        <div id="searchGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-5 mt-6"></div>
    </div>
    <div id="memberSection" class="section bg-white/80 backdrop-blur rounded-[35px] p-6 shadow-xl mt-6">
        <h2 class="text-4xl font-black mb-6">👥 Danh sách thành viên</h2>
        <div id="memberList" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
    </div>
    <div id="flowerSection" class="section bg-white/80 backdrop-blur rounded-[35px] p-6 shadow-xl mt-6">
        <h2 class="text-4xl font-black mb-6">🌸 Danh sách hoa</h2>
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
            <button onclick="showRarity('HOA ĐỎ')" class="bg-red-100 text-red-700 rounded-2xl p-5 font-black text-xl">🌹 HOA ĐỎ</button>
            <button onclick="showRarity('HOA CAM')" class="bg-orange-100 text-orange-700 rounded-2xl p-5 font-black text-xl">🧡 HOA CAM</button>
            <button onclick="showRarity('HOA TÍM')" class="bg-purple-100 text-purple-700 rounded-2xl p-5 font-black text-xl">💜 HOA TÍM</button>
            <button onclick="showRarity('HOA LAM')" class="bg-blue-100 text-blue-700 rounded-2xl p-5 font-black text-xl">💎 HOA LAM</button>
            <button onclick="showRarity('HOA LỤC')" class="bg-green-100 text-green-700 rounded-2xl p-5 font-black text-xl">🍀 HOA LỤC</button>
        </div>
        <div id="rarityGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-5 mt-6"></div>
    </div>
    <div id="adminSection" class="section bg-white/80 backdrop-blur rounded-[35px] p-6 shadow-xl mt-6">
        <h2 class="text-4xl font-black mb-6">🌷 Admin Panel</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input id="memberName" placeholder="🎮 Tên ingame thành viên" class="border rounded-2xl p-4"/>
            <input id="memberZalo" placeholder="💬 Tên zalo" class="border rounded-2xl p-4"/>
            <input id="flowerName" placeholder="🌸 Tên hoa" class="border rounded-2xl p-4"/>
            <select id="flowerType" class="border rounded-2xl p-4"><option value="xu">🌸 Hoa xu</option><option value="goi">🪙 Hoa gói</option></select>
            <select id="flowerRarity" class="border rounded-2xl p-4"><option>HOA ĐỎ</option><option>HOA CAM</option><option>HOA TÍM</option><option>HOA LAM</option><option>HOA LỤC</option></select>
            <input id="flowerImage" type="file" accept="image/*" class="border rounded-2xl p-4"/>
        </div>
        <div class="flex gap-4 mt-5 flex-wrap">
            <button onclick="addFlower()" class="bg-yellow-400 text-black px-8 py-4 rounded-2xl font-black text-xl shadow-lg">➕ Thêm dữ liệu</button>
            <button onclick="clearAllFlowers()" class="bg-red-500 text-white px-8 py-4 rounded-2xl font-black text-xl shadow-lg">🗑️ Xóa toàn bộ</button>
        </div>
        <hr class="my-8"><h3 class="text-3xl font-black mb-5">📦 Dữ liệu kho hoa</h3>
        <div id="adminFlowerList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>
    <div id="memberFlowerModal" class="modal"><div class="modal-content rounded-[35px] p-6 max-w-4xl w-full max-h-[90vh] overflow-y-auto"><div class="flex justify-between items-center mb-5"><h2 class="text-3xl font-black">🌸 Hoa thành viên</h2><button onclick="closeMemberModal()" class="bg-red-500 text-white px-4 py-2 rounded-xl">Đóng</button></div><div id="memberFlowerContent" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div></div></div>
    <div id="flowerOwnersModal" class="modal"><div class="modal-content rounded-[35px] p-6 max-w-2xl w-full max-h-[80vh] overflow-y-auto"><div class="flex justify-between items-center mb-5"><div><h2 class="text-3xl font-black">👥 Thành viên sở hữu</h2><p class="text-gray-500 text-lg mt-1" id="flowerOwnersSubTitle"></p></div><button onclick="closeFlowerOwnersModal()" class="bg-red-500 text-white px-4 py-2 rounded-xl">Đóng</button></div><div id="flowerOwnersContent" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div></div></div>
</div>
<script>
    let flowers = []; const adminPass = "DVD123"; const rarityOrder = { 'HOA ĐỎ': 1, 'HOA CAM': 2, 'HOA TÍM': 3, 'HOA LAM': 4, 'HOA LỤC': 5 };
    async function saveData(){ localStorage.setItem('dvdFlowers', JSON.stringify(flowers)); if(window.saveCloudData) await window.saveCloudData(); }
    function showSection(id){ document.querySelectorAll('.section').forEach(s=>s.classList.remove('active-section')); document.getElementById(id).classList.add('active-section'); }
    function adminLogin(){ const pass = prompt("Nhập mật khẩu Admin"); if(pass === adminPass){ showSection('adminSection'); } else { alert("Sai mật khẩu"); } }
    function rarityClass(r){ return 'rarity-' + (r==='HOA ĐỎ'?'red':r==='HOA CAM'?'orange':r==='HOA TÍM'?'purple':r==='HOA LAM'?'blue':'green'); }

    function getMergedFlowers(){
      const map = {};
      flowers.forEach((f, index)=>{
        const key = f.name.trim().toUpperCase();
        if(!map[key]) map[key] = { ...f, index, owners: [] };
        if(f.owners) f.owners.forEach(o => map[key].owners.push(o));
      });
      return Object.values(map).sort((a,b) => (rarityOrder[a.rarity]||6) - (rarityOrder[b.rarity]||6) || a.name.localeCompare(b.name));
    }

    function renderSearch(data=getMergedFlowers()){
      const grid = document.getElementById('searchGrid'); if(!grid) return;
      grid.innerHTML = data.map(f=>`
      <div onclick="showFlowerOwners('${f.name.replace(/'/g, "\\'")}')" class="${rarityClass(f.rarity)} card rounded-[30px] p-4 shadow-lg flex flex-col justify-between">
        <div><div class="flex justify-center"><img src="${f.image}" class="flower-img w-32 h-32 object-contain"/></div><h2 class="text-center text-xl font-black text-[#5f412e] mt-4 leading-tight">${f.name.toUpperCase()}</h2></div>
        <div class="mt-3 text-center"><div class="bg-white/80 py-1.5 rounded-full font-bold shadow text-sm text-gray-700">${f.flowerXu?'🪙 Hoa xu':'🎁 Hoa gói'}</div><div class="text-xs text-pink-600 font-bold mt-1.5">Sở hữu: ${f.owners.length} 🌸</div></div>
      </div>`).join('');
      document.getElementById('totalFlowers').innerText = data.length;
    }

    function searchFlowers(){
      const key = document.getElementById('searchInput').value.toLowerCase().trim(); const rarity = document.getElementById('rarityFilter').value;
      let data = getMergedFlowers();
      if(key) data = data.filter(f=> f.name.toLowerCase().includes(key) || f.owners.some(o=>o.ingame.toLowerCase().includes(key)));
      if(rarity) data = data.filter(f=> f.rarity === rarity);
      renderSearch(data);
    }

    function showRarity(r){
        const data = getMergedFlowers().filter(f=>f.rarity===r);
        document.getElementById('rarityGrid').innerHTML = data.map(f=>`
        <div onclick="showFlowerOwners('${f.name.replace(/'/g, "\\'")}')" class="${rarityClass(f.rarity)} card rounded-[30px] p-4 shadow-lg flex flex-col justify-between">
            <div><div class="flex justify-center"><img src="${f.image}" class="flower-img w-28 h-28 object-contain"/></div><h2 class="text-center text-lg font-black mt-4 text-[#5f412e] leading-tight">${f.name.toUpperCase()}</h2></div>
            <div class="mt-3 text-center"><div class="bg-white/60 py-1 rounded-full font-bold shadow text-xs text-gray-700">${f.flowerXu?'🪙 Hoa xu':'🎁 Hoa gói'}</div><div class="text-[11px] text-pink-600 font-bold mt-1.5">Sở hữu: ${f.owners.length} 🌸</div></div>
        </div>`).join('');
    }

    function showMemberFlowers(memberName){
        const data = getMergedFlowers().filter(f=> f.owners.some(o => o.ingame.trim().toLowerCase() === memberName.trim().toLowerCase()));
        document.getElementById('memberFlowerContent').innerHTML = data.map(f=>`
            <div class="${rarityClass(f.rarity)} rounded-3xl p-4 shadow-lg">
                <div class="flex justify-center"><img src="${f.image}" class="w-24 h-24 object-contain"/></div>
                <h3 class="text-center font-black mt-3 text-[#5f412e]">${f.name.toUpperCase()}</h3>
            </div>`).join('');
        document.getElementById('memberFlowerModal').style.display='flex';
    }

    function closeMemberModal(){ document.getElementById('memberFlowerModal').style.display='none'; }

    function showFlowerOwners(flowerName){
        const f = getMergedFlowers().find(f => f.name.trim().toUpperCase() === flowerName.trim().toUpperCase());
        document.getElementById('flowerOwnersSubTitle').innerText = `Hoa: ${f.name.toUpperCase()}`;
        document.getElementById('flowerOwnersContent').innerHTML = f.owners.sort((a,b)=>a.ingame.localeCompare(b.ingame)).map(o => `
            <div class="owner-box rounded-2xl p-4 shadow-sm border border-pink-100"><div class="text-lg font-black text-[#1c5d4d]">🎮 ${o.ingame}</div><div class="text-sm text-gray-600">💬 ${o.zalo||'Không zalo'}</div></div>`).join('');
        document.getElementById('flowerOwnersModal').style.display = 'flex';
    }
    function closeFlowerOwnersModal(){ document.getElementById('flowerOwnersModal').style.display = 'none'; }

    function renderMembers(){
        const members = {};
        flowers.forEach(f => f.owners.forEach(o => members[o.ingame.trim().toLowerCase()] = o));
        document.getElementById('memberList').innerHTML = Object.values(members).sort((a,b)=>a.ingame.localeCompare(b.ingame)).map(m=>`
            <button onclick="showMemberFlowers('${m.ingame.replace(/'/g, "\\'")}')" class="owner-box rounded-3xl p-5 text-left shadow"><div class="text-2xl font-black text-[#1c5d4d]">🎮 ${m.ingame}</div><div class="text-gray-600">💬 ${m.zalo||'Không có zalo'}</div></button>`).join('');
    }

    // --- TÍNH NĂNG ADMIN ĐƯỢC CHÈN THÊM ---
  function renderAdminFlowers() {
  document.getElementById('adminFlowerList').innerHTML = flowers.map((f, fIdx) => `
    <div class="${rarityClass(f.rarity)} rounded-3xl p-5 shadow-lg mb-4">
      <div class="flex gap-4 items-center">
         <img src="${f.image}" class="w-20 h-20 rounded-xl cursor-pointer object-cover" onclick="editImg(${fIdx})">
         <div>
            <div class="font-black text-lg">${f.name}</div>
            <button onclick="editInfo(${fIdx})" class="text-xs bg-yellow-500 px-3 py-1 rounded font-bold mt-1">Sửa Tên Hoa</button>
         </div>
      </div>
      <div class="mt-3 grid gap-2">
        ${f.owners.map((o, oIdx) => `
          <div class="flex justify-between items-center bg-white/60 p-3 rounded-xl text-sm shadow-sm">
            <span class="font-bold">🎮 ${o.ingame}</span>
            <div class="flex gap-2">
                <button onclick="editMemName(${fIdx}, ${oIdx})" class="text-blue-600 font-bold hover:underline">Sửa</button>
                <button onclick="delMem(${fIdx}, ${oIdx})" class="text-red-600 font-bold hover:underline">Xóa</button>
            </div>
          </div>
        `).join('')}
      </div>
      <button onclick="delFlow(${fIdx})" class="mt-4 w-full bg-red-600 text-white py-2 rounded-xl text-sm font-black">🗑️ Xóa toàn bộ bông hoa này</button>
    </div>
  `).join('');
}

function editMemName(fi, oi) {
    const newName = prompt("Nhập tên Ingame mới cho " + flowers[fi].owners[oi].ingame + ":", flowers[fi].owners[oi].ingame);
    if (newName && newName.trim() !== "") {
        flowers[fi].owners[oi].ingame = newName.trim();
        saveData();
        renderAdminFlowers();
        if(window.renderSearch) renderSearch();
        if(window.renderMembers) renderMembers();
    }
}
    function editInfo(i) { const n = prompt("Tên mới:", flowers[i].name); if(n) { flowers[i].name=n; saveData(); renderAdminFlowers(); } }
    function editImg(i) { const input = document.createElement('input'); input.type='file'; input.onchange=e=>{ const r=new FileReader(); r.onload=ev=>{flowers[i].image=ev.target.result; saveData(); renderAdminFlowers();}; r.readAsDataURL(e.target.files[0]); }; input.click(); }
    function delMem(fi, oi) { if(confirm("Xóa thành viên?")) { flowers[fi].owners.splice(oi, 1); saveData(); renderAdminFlowers(); } }
    function delFlow(i) { if(confirm("Xóa hoa này?")) { flowers.splice(i, 1); saveData(); renderAdminFlowers(); } }
    function clearAllFlowers(){ if(confirm('Xóa hết?')){ flowers=[]; saveData(); renderAdminFlowers(); } }
    function addFlower(){
        const ingame = document.getElementById('memberName').value.trim();
        const zalo = document.getElementById('memberZalo').value.trim();
        const flowerName = document.getElementById('flowerName').value.trim();
        const img = document.getElementById('flowerImage').files[0];
        if(!ingame || !flowerName) return alert("Thiếu info!");
        const exist = flowers.find(f => f.name.trim().toUpperCase() === flowerName.toUpperCase());
        if(exist) { exist.owners.push({ ingame, zalo }); saveData(); renderAdminFlowers(); alert('Đã cập nhật!'); }
        else {
            if(!img) return alert("Chọn ảnh!");
            const r = new FileReader(); r.onload = e => { flowers.push({ name: flowerName, rarity: document.getElementById('flowerRarity').value, image: e.target.result, flowerXu: document.getElementById('flowerType').value === 'xu' ? 1 : 0, owners: [{ ingame, zalo }] }); saveData(); renderAdminFlowers(); alert("Đã thêm!"); };
            r.readAsDataURL(img);
        }
    }
    window.addEventListener('load', () => { renderSearch(); renderMembers(); renderAdminFlowers(); });
</script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    const firebaseConfig = { apiKey: "AIzaSyAip9TsFQLFVYfTCafngZh81W6saGWqEvQ", authDomain: "dvdhoa.firebaseapp.com", projectId: "dvdhoa", storageBucket: "dvdhoa.firebasestorage.app", messagingSenderId: "895700989452", appId: "1:895700989452:web:06ed440fbe3b6aafd1a029", measurementId: "G-2MBFFLEKP3" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const dataRef = doc(db, "dvdflower", "data");
    onSnapshot(dataRef, (snap) => { if(snap.exists()){ flowers = snap.data().flowers || []; localStorage.setItem('dvdFlowers', JSON.stringify(flowers)); renderSearch(); renderMembers(); renderAdminFlowers(); } });
    window.saveCloudData = async function(){ await setDoc(dataRef, { flowers: flowers }); };
</script>
</body>
</html>
