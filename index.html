<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DvD Flower</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Fredoka - Hỗ trợ đầy đủ tiếng Việt -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Ép buộc font Fredoka cho toàn bộ văn bản */
        * {
            font-family: 'Fredoka', sans-serif !important;
        }
        
        body { 
            min-height: 100vh; 
            background: radial-gradient(circle at top left, rgba(255,182,216,.45), transparent 28%), radial-gradient(circle at top right, rgba(255,255,180,.28), transparent 24%), radial-gradient(circle at bottom right, rgba(170,255,210,.35), transparent 30%), linear-gradient( to bottom, #fff6fb 0%, #f6fff8 40%, #eef8ff 100% ); 
            overflow-x: hidden; 
        }

        .header-box { background: linear-gradient(135deg, #0c4c3d, #196953); }
        .section { display: none; }
        .active-section { display: block; }
        
        /* Đảm bảo các ký tự có dấu không bị lỗi hiển thị */
        h1, h2, h3, h4, p, span, button, input, select {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body>

<div class="max-w-7xl mx-auto p-5">
    <div class="header-box rounded-[40px] p-8 shadow-2xl">
        <h1 class="text-5xl font-bold text-white">DvD Flower</h1>
        <p class="text-green-100 mt-2 text-xl">Fantasy Flower Inventory RPG</p>
    </div>
    <!-- Nội dung hiển thị -->
    <div id="content" class="mt-6">
        <p class="text-2xl text-gray-800">Chào mừng bạn! Hệ thống đã được cấu hình font tiếng Việt chuẩn.</p>
    </div>
</div>

<script>
    // Logic của bạn giữ nguyên tại đây
</script>

</body>
</html>
